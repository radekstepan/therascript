name: therascript

services:
  llama-server:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    container_name: therascript_llama_server
    ports:
      - "1234:1234"
    volumes:
      # Models directory mounted into LM Studio's model path inside the container.
      # Place your GGUF model files (or LM Studio model folders) here.
      - ./models:/root/.lmstudio/models
    environment:
      - LMS_PORT=1234
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    restart: unless-stopped
